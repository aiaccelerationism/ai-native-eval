name: CI

on:
  pull_request:
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - docs/**
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - docs/**

permissions:
  contents: read

jobs:
  deterministic-gates:
    name: Deterministic gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test deterministic tool and packaging
        run: pnpm test

      - name: Validate committed self-evaluation folder
        run: pnpm self-eval:validate

      - name: Check committed self-evaluation report freshness
        run: pnpm self-eval:check

      - name: Validate skill eval contracts
        run: pnpm skill-eval:contract
