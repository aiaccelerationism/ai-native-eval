version: "1"

skill: ..

defaults:
  agent: codex
  provider: local
  trials: 1
  timeout: 300
  threshold: 1.0

tasks:
  - name: ai-native-eval-basic-routing
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/final-response.md`.

      The response must include the exact marker `AI_NATIVE_SKILL_EVAL_COMPLETE`,
      the skill name `ai-native-eval`, and one concise sentence describing this skill's
      primary responsibility. Do not modify repository files other than the requested
      output artifact.
    workspace:
      - src: expectations/basic-routing.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/basic-routing.sh
        dest: basic-routing.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/basic-routing.sh
  - name: ai-native-eval-artifact-bundle-default
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/artifact-bundle-response.md`.

      The response must include the exact marker `AI_NATIVE_ARTIFACT_BUNDLE_DEFAULT`,
      the default generated artifact bundle path pattern, and one concise sentence
      explaining when `/tmp` is appropriate. Do not modify repository files other
      than the requested output artifact.
    workspace:
      - src: expectations/artifact-bundle-default.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/artifact-bundle-default.sh
        dest: artifact-bundle-default.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/artifact-bundle-default.sh
  - name: ai-native-eval-bare-request-menu
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/bare-request-response.md`.

      Simulate a user who only says "use ai-native-eval" without target or scope.
      The response must include the exact marker `AI_NATIVE_BARE_REQUEST_MENU`
      and list the available lifecycle evaluator choices. Do not modify repository
      files other than the requested output artifact.
    workspace:
      - src: expectations/bare-request-menu.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/bare-request-menu.sh
        dest: bare-request-menu.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/bare-request-menu.sh
  - name: ai-native-eval-repo-request-routing
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/repo-routing-response.md`.

      Simulate a user who asks to evaluate the whole repository. The response
      must include the exact marker `AI_NATIVE_REPO_REQUEST_ROUTE` and route
      directly to the repo maturity evaluator without asking for target choice.
      Do not modify repository files other than the requested output artifact.
    workspace:
      - src: expectations/repo-request-routing.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/repo-request-routing.sh
        dest: repo-request-routing.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/repo-request-routing.sh
  - name: ai-native-eval-pr-request-routing
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/pr-routing-response.md`.

      Simulate a user who asks to evaluate a PR. The response must include the
      exact marker `AI_NATIVE_PR_REQUEST_ROUTE` and route directly to the PR
      lifecycle evaluator without asking whether the target is a PR. Do not modify
      repository files other than the requested output artifact.
    workspace:
      - src: expectations/pr-request-routing.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/pr-request-routing.sh
        dest: pr-request-routing.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/pr-request-routing.sh
  - name: ai-native-eval-thread-request-routing
    instruction: |
      Read `SKILL.md` for this skill and write the response to
      `outputs/thread-routing-response.md`.

      Simulate a user who asks to evaluate the current thread state. The response
      must include the exact marker `AI_NATIVE_THREAD_REQUEST_ROUTE` and route
      directly to the thread checkpoint evaluator. Do not modify repository files
      other than the requested output artifact.
    workspace:
      - src: expectations/thread-request-routing.json
        dest: expectations/expected.json
      - src: ../../_eval-support/grade-response.mjs
        dest: eval-support/grade-response.mjs
      - src: solutions/thread-request-routing.sh
        dest: thread-request-routing.sh
    graders:
      - type: deterministic
        run: node eval-support/grade-response.mjs expectations/expected.json
    solution: solutions/thread-request-routing.sh
